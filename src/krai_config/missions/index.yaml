version: 1
default_mission_id: debug_square
categories:
- id: debug
  name: Debug / Fake Bench Tests
- id: real_test
  name: Real Robot Low-Speed Tests
- id: match
  name: Match Autonomous Strategies
- id: mechanism
  name: Slave B / Mechanism Tests
- id: calibration
  name: Calibration and Sensor Checks
- id: recovery
  name: Recovery / Safety Motions
- id: match_box
  name: Match Box Target Index
- id: match_weapon
  name: Match Weapon Target Index
missions:
- id: debug_forward_turn
  name: Debug Forward Turn
  file: debug/debug_forward_turn.yaml
  category: debug
  enabled: true
  description: Reset, move 50 cm, turn 45 deg, then stop. Good first mission smoke
    test.
- id: debug_square
  name: Debug Square
  file: debug/debug_square.yaml
  category: debug
  enabled: true
  description: Fake-mode square-style sequence using relative move and turn primitives.
- id: real_short_test
  name: Real Robot Short Test
  file: real_test/real_short_test.yaml
  category: real_test
  enabled: true
  description: 'Very conservative first real robot mission: 20 cm move and 30 deg
    turn.'
- id: real_move_20cm
  name: Real Move 20 cm
  file: real_test/real_move_20cm.yaml
  category: real_test
  enabled: true
  description: Low-speed straight movement test for real robot mode.
- id: real_turn_30deg
  name: Real Turn 30 deg
  file: real_test/real_turn_30deg.yaml
  category: real_test
  enabled: true
  description: Low-speed heading turn test for real robot mode.
- id: auto_left
  name: Match Auto Left
